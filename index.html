<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Savor & Dip • Makanan Minuman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #faf7f2;
            padding: 16px 12px;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Poppins', sans-serif;
        }

        /* kontainer utama – fleksibel di semua android */
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* header */
        .header {
            text-align: center;
            padding: 1.2rem 0.5rem 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2d4c4;
        }
        .header h1 {
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            background: linear-gradient(135deg, #2e241a, #5f4a33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: clamp(0.75rem, 3.5vw, 0.9rem);
            color: #7f6b58;
        }

        /* grid menu – otomatis 1 atau 2 kolom tergantung lebar layar */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* card menu – proporsional, tidak mepet */
        .menu-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #f0e7de;
            transition: 0.2s;
        }
        .card-img {
            height: clamp(130px, 28vw, 170px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 10vw, 4.2rem);
            background: #f4ede5;
        }
        .card-content {
            padding: 1rem 1.2rem 1.3rem;
        }
        .card-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }
        .card-title span:first-child {
            font-size: clamp(1rem, 4.5vw, 1.3rem);
            font-weight: 600;
        }
        .price {
            background: #fff0e6;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: clamp(0.75rem, 3.5vw, 0.85rem);
            font-weight: 700;
            color: #b76935;
            white-space: nowrap;
        }
        .desc {
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            color: #6b5a4a;
            margin: 8px 0 14px;
            line-height: 1.35;
        }
        .qty-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .qty-btn {
            background: #f3ede7;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .qty-btn:active {
            background: #e2d3c6;
            transform: scale(0.96);
        }
        .qty-num {
            font-weight: 600;
            font-size: 1.1rem;
            min-width: 32px;
            text-align: center;
        }
        .add-btn {
            width: 100%;
            background: #2c2418;
            border: none;
            padding: 12px 0;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-btn:active {
            background: #4f3925;
            transform: scale(0.97);
        }

        /* keranjang – full lebar dengan padding pas */
        .cart-section {
            background: rgba(255,255,255,0.96);
            border-radius: 36px;
            padding: 20px 18px;
            border: 1px solid #eedfcb;
            backdrop-filter: blur(2px);
            margin-top: 8px;
        }
        .cart-section h2 {
            font-size: clamp(1.3rem, 5vw, 1.7rem);
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .cart-items {
            list-style: none;
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eedfcb;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cart-item-name {
            font-weight: 500;
            font-size: 0.85rem;
            flex: 2;
        }
        .cart-item-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart-item-controls button {
            background: none;
            border: 1px solid #d9c8b6;
            width: 30px;
            height: 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .cart-total {
            text-align: right;
            font-size: clamp(1.2rem, 6vw, 1.6rem);
            font-weight: 800;
            margin: 18px 0 20px;
            border-top: 2px dashed #e6d5c2;
            padding-top: 16px;
        }
        .checkout-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .qris-btn, .wa-btn {
            width: 100%;
            padding: 14px 12px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
        }
        .qris-btn {
            background: #1f3b2c;
            color: white;
        }
        .wa-btn {
            background: #25D366;
            color: white;
        }
        .qris-btn:active, .wa-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* modal QRIS link – full mobile friendly */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 20px;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: white;
            max-width: 380px;
            width: 90%;
            border-radius: 44px;
            padding: 28px 20px;
            text-align: center;
        }
        .qris-link-btn {
            background: #004d40;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 18px 0;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .close-modal {
            background: #2c2418;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 6px;
        }

        /* untuk android lebih kecil dari 380px */
        @media (max-width: 420px) {
            body {
                padding: 12px 8px;
            }
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .cart-item-controls {
                align-self: flex-end;
            }
            .card-content {
                padding: 0.9rem;
            }
            .qty-btn {
                width: 32px;
                height: 32px;
            }
        }

        /* sentuhan untuk android besar (tablet kecil sekalipun rapi) */
        @media (min-width: 800px) {
            .container {
                max-width: 800px;
            }
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SAVOR & SIP</h1>
        <p>makanan • minuman • rasa seimbang</p>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-section">
        <h2>🍽️ pesanan kamu</h2>
        <ul class="cart-items" id="cartList"></ul>
        <div class="cart-total" id="cartTotal">Rp 0</div>
        <div class="checkout-group">
            <button class="qris-btn" id="qrisPayBtn">💳 Bayar via QRIS (Link)</button>
            <button class="wa-btn" id="waConfirmBtn">📲 Konfirmasi ke WhatsApp</button>
        </div>
    </div>
</div>

<div id="qrisModal" class="modal">
    <div class="modal-content">
        <h3>🔗 QRIS Link</h3>
        <p style="margin: 12px 0; font-size: 14px;">Klik tombol di bawah untuk bayar</p>
        <a href="#" id="dynamicQrisLink" target="_blank" class="qris-link-btn">💸 BAYAR VIA QRIS</a>
        <p style="font-size: 13px;">Total: <strong id="modalTotal">Rp0</strong></p>
        <button class="close-modal" onclick="closeQrisModal()">Tutup</button>
    </div>
</div>

<script>
    // ========== QRIS LINK DARI GAMBAR ==========
    const QRIS_LINK = "https://cdn.phototourl.com/free/2026-05-18-70eab518-83c0-4d4f-87ee-4e98a72fbc31.jpg";

    // NOMOR WA & DANA
    const NO_WA = "083180072584";
    const NO_DANA = "082381531460";

    // MENU MAKANAN + MINUMAN
    const menuData = [
        { id: 1, name: "Truffle Melt Bowl", price: 42000, desc: "Nasi truffle, beef slice, jamur", emoji: "🍚", bg: "#f3e2cf" },
        { id: 2, name: "Salmon Teriyaki Don", price: 55000, desc: "Salmon glazur teriyaki, nori", emoji: "🐟", bg: "#f7e1d4" },
        { id: 3, name: "Lava Chicken Rice", price: 38000, desc: "Ayam pedas manis, lava sauce", emoji: "🍗", bg: "#f5e0d0" },
        { id: 4, name: "Iced Lychee Tea", price: 22000, desc: "Teh bunga telang + lychee jelly", emoji: "🧋", bg: "#dee9e6" },
        { id: 5, name: "Matcha Cloud", price: 28000, desc: "Matcha premium, foam susu", emoji: "🍵", bg: "#dbefd8" },
        { id: 6, name: "Citrus Sparkle", price: 25000, desc: "Lemon, mint, soda segar", emoji: "🍊", bg: "#fff0da" },
        { id: 7, name: "Carbonara Spaghetti", price: 45000, desc: "Pasta creamy + smoked beef", emoji: "🍝", bg: "#f7e9df" },
        { id: 8, name: "Choco Lava Cake", price: 32000, desc: "Brownies lava + es krim", emoji: "🍰", bg: "#eeddcf" }
    ];

    let cart = [];

    function renderMenu() {
        const container = document.getElementById('menuGrid');
        container.innerHTML = '';
        for (let item of menuData) {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <div class="card-img" style="background: ${item.bg};">${item.emoji}</div>
                <div class="card-content">
                    <div class="card-title">
                        <span>${item.name}</span>
                        <span class="price">Rp ${item.price.toLocaleString()}</span>
                    </div>
                    <div class="desc">${item.desc}</div>
                    <div class="qty-box">
                        <button class="qty-btn" data-id="${item.id}" data-delta="-1">−</button>
                        <span class="qty-num" id="qty-${item.id}">0</span>
                        <button class="qty-btn" data-id="${item.id}" data-delta="1">+</button>
                    </div>
                    <button class="add-btn" data-id="${item.id}">+ Tambah ke keranjang</button>
                </div>
            `;
            container.appendChild(card);
        }
        attachEvents();
        updateQtys();
    }

    function attachEvents() {
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.removeEventListener('click', qtyHandler);
            btn.addEventListener('click', qtyHandler);
        });
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.removeEventListener('click', addHandler);
            btn.addEventListener('click', addHandler);
        });
    }

    function qtyHandler(e) {
        const id = parseInt(e.currentTarget.dataset.id);
        const delta = parseInt(e.currentTarget.dataset.delta);
        const idx = cart.findIndex(c => c.id === id);
        let newQty = (idx !== -1 ? cart[idx].quantity : 0) + delta;
        if (newQty <= 0) {
            if (idx !== -1) cart.splice(idx,1);
        } else {
            if (idx !== -1) cart[idx].quantity = newQty;
            else {
                const item = menuData.find(i => i.id === id);
                cart.push({ id: item.id, name: item.name, price: item.price, quantity: newQty });
            }
        }
        updateQtys();
        renderCart();
    }

    function addHandler(e) {
        const id = parseInt(e.currentTarget.dataset.id);
        const item = menuData.find(i => i.id === id);
        const existing = cart.find(c => c.id === id);
        if(existing) existing.quantity += 1;
        else cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1 });
        updateQtys();
        renderCart();
    }

    function updateQtys() {
        menuData.forEach(item => {
            const span = document.getElementById(`qty-${item.id}`);
            if(span) {
                const found = cart.find(c => c.id === item.id);
                span.innerText = found ? found.quantity : 0;
            }
        });
    }

    function getTotal() {
        return cart.reduce((sum,i) => sum + (i.price * i.quantity), 0);
    }

    function renderCart() {
        const cartList = document.getElementById('cartList');
        const totalSpan = document.getElementById('cartTotal');
        if(!cartList) return;
        if(cart.length === 0) {
            cartList.innerHTML = '<li style="text-align:center;padding:20px; color:#8f7a64;">🛒 Keranjang kosong</li>';
            totalSpan.innerText = 'Rp 0';
            return;
        }
        let html = '';
        let total = 0;
        cart.forEach(item => {
            const sub = item.price * item.quantity;
            total += sub;
            html += `
                <li class="cart-item">
                    <div class="cart-item-name">${item.name} <span style="font-size:12px;">x${item.quantity}</span></div>
                    <div class="cart-item-controls">
                        <span>Rp ${sub.toLocaleString()}</span>
                        <button class="cart-minus" data-id="${item.id}">−</button>
                        <button class="cart-plus" data-id="${item.id}">+</button>
                        <button class="cart-remove" data-id="${item.id}">🗑</button>
                    </div>
                </li>
            `;
        });
        cartList.innerHTML = html;
        totalSpan.innerText = `Rp ${total.toLocaleString()}`;

        document.querySelectorAll('.cart-minus').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const existing = cart.find(c => c.id === id);
                if(existing) {
                    if(existing.quantity <= 1) cart = cart.filter(c => c.id !== id);
                    else existing.quantity -= 1;
                    updateQtys();
                    renderCart();
                }
            });
        });
        document.querySelectorAll('.cart-plus').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                const existing = cart.find(c => c.id === id);
                if(existing) { existing.quantity += 1; updateQtys(); renderCart(); }
            });
        });
        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                cart = cart.filter(c => c.id !== id);
                updateQtys();
                renderCart();
            });
        });
    }

    function formatOrderText() {
        if(cart.length===0) return "Halo, saya ingin order makanan/minuman";
        let msg = "🍽️ *ORDER BARU* 🍹\n\n";
        cart.forEach(i => msg += `▸ ${i.name}  x${i.quantity}  = Rp ${(i.price*i.quantity).toLocaleString()}\n`);
        msg += `\n💰 *TOTAL: Rp ${getTotal().toLocaleString()}*\n\n✅ Sudah bayar via QRIS.\nTerima kasih.`;
        return encodeURIComponent(msg);
    }

    // QRIS modal logic
    const modal = document.getElementById('qrisModal');
    window.openQrisModal = function() {
        const total = getTotal();
        if(total === 0) { alert("Keranjang masih kosong, pilih menu dulu ya."); return; }
        document.getElementById('modalTotal').innerText = `Rp ${total.toLocaleString()}`;
        const linkBtn = document.getElementById('dynamicQrisLink');
        linkBtn.href = QRIS_LINK;
        modal.classList.add('active');
    };
    window.closeQrisModal = function() { modal.classList.remove('active'); };
    document.getElementById('qrisPayBtn').addEventListener('click', openQrisModal);

    // konfirmasi wa + dana
    document.getElementById('waConfirmBtn').addEventListener('click', () => {
        if(cart.length === 0) { alert("Keranjang kosong."); return; }
        const pesan = formatOrderText();
        window.open(`https://wa.me/${NO_WA}?text=${pesan}`, '_blank');
        setTimeout(() => {
            window.open(`https://wa.me/${NO_DANA}?text=${pesan}`, '_blank');
        }, 500);
        alert(`✅ Order dikirim ke WA ${NO_WA} & ${NO_DANA}\nTotal: Rp ${getTotal().toLocaleString()}`);
    });

    renderMenu();
    renderCart();
</script>
</body>
</html>
