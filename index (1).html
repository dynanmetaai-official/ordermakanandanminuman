<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nann Official · Luxury Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #0a0a12, #010105);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }
        .star { position: fixed; background: linear-gradient(135deg, #fff, #ffe6b3); border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0; animation: starFade 3s infinite alternate; }
        @keyframes starFade { 0% { opacity: 0.1; transform: scale(0.8); } 100% { opacity: 0.8; transform: scale(1.1); } }
        .nebula { position: fixed; background: radial-gradient(circle, rgba(212,175,55,0.1), rgba(138,43,226,0.05), transparent); border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; }
        .container { max-width: 480px; width: 100%; position: relative; z-index: 10; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #e8d5b0, #d4af37, #f0e6c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .logo p { color: rgba(255,255,245,0.5); font-size: 0.8rem; letter-spacing: 1px; }
        .card {
            background: rgba(10,10,20,0.55);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.2rem;
            border: 1px solid rgba(212,175,55,0.35);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 1.3rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255,255,245,0.7);
            letter-spacing: 0.5px;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input, .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 60px;
            border: 1px solid rgba(212,175,55,0.4);
            background: rgba(20,20,35,0.8);
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .password-wrapper input:focus, .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: rgba(255,255,245,0.6);
            font-size: 1rem;
        }
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #d4af37, #b8960c);
            color: #1a1508;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.2s;
        }
        .btn-submit:hover { transform: scale(1.02); }
        .message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #ff6b6b;
        }
        .link-register {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255,255,245,0.6);
        }
        .link-register a {
            color: #d4af37;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        .info-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: rgba(255,255,245,0.35);
        }
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            .logo h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="starsField"></div><div id="dynamicNebula"></div>
    <div class="container">
        <div class="logo">
            <h1>✨ NANN OFFICIAL ✨</h1>
            <p>Luxury Digital Marketplace</p>
        </div>
        <div class="card">
            <div id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Masukkan username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Masukkan password">
                        <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
                    </div>
                </div>
                <button class="btn-submit" id="loginBtn">Login</button>
                <div class="link-register">Belum punya akun? <a id="showRegister">Daftar Member</a></div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="Masukkan username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Minimal 4 karakter">
                        <i class="fas fa-eye toggle-password" data-target="regPassword"></i>
                    </div>
                </div>
                <button class="btn-submit" id="registerBtn">Daftar Member</button>
                <div class="link-register">Sudah punya akun? <a id="showLogin">Login di sini</a></div>
            </div>
            <div id="message" class="message"></div>
            <div class="info-text"><i class="fas fa-shield-alt"></i> Data tersimpan di browser Anda</div>
        </div>
    </div>
    <script src="saldo.js"></script>
    <script>
        function createStars(){for(let i=0;i<120;i++){let s=document.createElement('div');s.classList.add('star');s.style.width=Math.random()*2+1+'px';s.style.height=s.style.width;s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animation='starFade '+ (Math.random()*3+2)+'s infinite alternate';document.getElementById('starsField').appendChild(s);}}
        function createNebula(){for(let i=0;i<3;i++){let n=document.createElement('div');n.classList.add('nebula');n.style.left=Math.random()*80+10+'%';n.style.top=Math.random()*70+15+'%';n.style.width=Math.random()*250+150+'px';n.style.height=n.style.width;document.getElementById('dynamicNebula').appendChild(n);}}
        createStars();createNebula();
        
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        });
        
        function initData() {
            if (!localStorage.getItem('users')) {
                localStorage.setItem('users', JSON.stringify([
                    { id: 1, username: 'dynan', password: btoa('257368419'), role: 'owner', saldo: 0 }
                ]));
            }
            if (!localStorage.getItem('products')) {
                localStorage.setItem('products', JSON.stringify([
                    { id: 1, name: '🤖 JASA JADI BOT WHATSAPP', price: 1000, benefit: 'JADI OWNER BOT, FITUR 1500+, ANTI DELAY' },
                    { id: 2, name: '🎬 ALIGHT MOTION PREMIUM', price: 10000, benefit: 'AKUN PRIVATE, NO WATERMARK, ALL FITUR PRO' },
                    { id: 3, name: '🥚 NOKOS INDON OLD', price: 10000, benefit: 'VERSI OLD LIMITED, PREMIUM ACCESS' },
                    { id: 4, name: '🥚 NOKOS INDON FRESH', price: 6000, benefit: 'VERSI FRESH UPDATE, FULL SUPPORT' }
                ]));
            }
            if (!localStorage.getItem('topup_requests')) localStorage.setItem('topup_requests', '[]');
            if (!localStorage.getItem('transactions')) localStorage.setItem('transactions', '[]');
        }
        initData();
        
        document.getElementById('showRegister').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        };
        document.getElementById('showLogin').onclick = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        };
        
        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) {
                document.getElementById('message').innerHTML = 'Isi username dan password!';
                return;
            }
            const users = SaldoManager.getUsers();
            const user = users.find(u => u.username === username && atob(u.password) === password);
            if (!user) {
                document.getElementById('message').innerHTML = 'Username atau password salah!';
                return;
            }
            localStorage.setItem('currentUser', JSON.stringify({ id: user.id, username: user.username, role: user.role, saldo: user.saldo }));
            if (user.role === 'owner') window.location.href = 'owner.html';
            else window.location.href = 'member.html';
        };
        
        document.getElementById('registerBtn').onclick = () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!username || !password) {
                document.getElementById('message').innerHTML = 'Isi semua field!';
                return;
            }
            if (password.length < 4) {
                document.getElementById('message').innerHTML = 'Password minimal 4 karakter!';
                return;
            }
            const users = SaldoManager.getUsers();
            if (users.find(u => u.username === username)) {
                document.getElementById('message').innerHTML = 'Username sudah terdaftar!';
                return;
            }
            const newId = users.length + 1;
            users.push({ id: newId, username: username, password: btoa(password), role: 'member', saldo: 0 });
            localStorage.setItem('users', JSON.stringify(users));
            document.getElementById('message').innerHTML = '✅ Registrasi berhasil! Silakan login.';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            setTimeout(() => document.getElementById('showLogin').click(), 1500);
        };
    </script>
</body>
</html>
